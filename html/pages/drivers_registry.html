<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- DRIVERS REGISTRY PAGE -->
<div id="page-drivers">
  <div class="dr-breadcrumb">Organization &nbsp;/&nbsp; Driver Management</div>
  <div class="dr-page-header">
    <div>
      <h1 class="dr-title">Drivers Registry</h1>
      <p class="dr-desc">Manage the active fleet of TODA Sovereign members. Track member status, vehicle assignments, and contact records in real-time.</p>
    </div>
    <div class="dr-header-actions">
      <button class="dr-filter-btn">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Advanced Filters
      </button>
      <button class="dr-add-btn" onclick="openDriverModal()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Add New Driver
      </button>
    </div>
  </div>

  <div class="dr-table-card">
    <table class="dr-table">
      <thead>
        <tr>
          <th>Member Info</th>
          <th>Body Number</th>
          <th>Account Status</th>
          <th>Contact Info</th>
          <th>License</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="driver-table-body"></tbody>
    </table>
    <div class="dr-pagination-row">
      <div class="dr-showing" id="dr-showing">Showing 1 – 4 of 0 total members</div>
      <div class="dr-pages">
        <button class="dr-pg-btn" id="dr-prev" onclick="drChangePage(-1)">&#8249;</button>
        <span id="dr-page-btns"></span>
        <button class="dr-pg-btn" id="dr-next" onclick="drChangePage(1)">&#8250;</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
