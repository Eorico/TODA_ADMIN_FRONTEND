<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | MAMTTODA</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/admin_login.css">
</head>

<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="page-wrapper">

    <!-- Branding -->
    <div class="branding">
      <div class="icon-wrap">
        <!-- Bus icon -->
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="20" height="13" rx="2" fill="#8B0000" opacity="0.15"/>
          <rect x="2" y="4" width="20" height="13" rx="2" stroke="#8B0000" stroke-width="1.8" fill="none"/>
          <rect x="4" y="7" width="4.5" height="3.5" rx="0.8" fill="#8B0000" opacity="0.6"/>
          <rect x="9.75" y="7" width="4.5" height="3.5" rx="0.8" fill="#8B0000" opacity="0.6"/>
          <rect x="15.5" y="7" width="4.5" height="3.5" rx="0.8" fill="#8B0000" opacity="0.6"/>
          <line x1="2" y1="13" x2="22" y2="13" stroke="#8B0000" stroke-width="1.4"/>
          <line x1="12" y1="4" x2="12" y2="17" stroke="#8B0000" stroke-width="1.2" opacity="0.35"/>
          <circle cx="6.5" cy="19" r="2" fill="#8B0000"/>
          <circle cx="17.5" cy="19" r="2" fill="#8B0000"/>
          <line x1="4" y1="17" x2="4" y2="19.5" stroke="#8B0000" stroke-width="1.4"/>
          <line x1="20" y1="17" x2="20" y2="19.5" stroke="#8B0000" stroke-width="1.4"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">Admin Login</div>
        <div class="brand-sub">Las Pinas City Terminal &nbsp;|&nbsp; MAMTTODA Management</div>
      </div>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="field-group">

        <!-- Admin ID -->
        <div class="field">
          <label for="admin-id">Admin Username:</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="admin-id" placeholder="Enter admin ID" autocomplete="username"/>
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Password:</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
            <button class="eye-toggle" id="eye-btn" type="button" aria-label="Toggle password visibility">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

      </div>

      <!-- Login button -->
      <button class="btn-login" id="login-btn" type="button">
        <span class="btn-text">Login</span>
        <span class="spinner"></span>
      </button>

      <!-- Error -->
      <div class="error-msg" id="error-msg">Invalid admin ID or password. Please try again.</div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-line">Authorized Personnel Only</span>
      <span class="footer-line">© 2024 MAMTTODA Community Transport</span>
    </div>

  </div>

  <script type="module">
    import { AdminLogin } from '../js/auth/admin_login.js';
    const login = new AdminLogin();
    login.init()
  </script>
</body>
</html>
