<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- VIOLATION ADD MODAL -->
<div class="modal-overlay" id="vio-modal">
    <div class="tc-modal" style="max-width:480px;width:480px">
        <span class="tc-modal-tag">Coding Violation</span>
        <div id="vio-modal-title" class="tc-modal-title">Record Violation</div>
        <div class="tc-modal-sub">Log a coding violation for a registered driver.</div>

        <div class="tc-modal-row">
            <div class="tc-modal-field" style="grid-column:1/-1">
                <label class="tc-modal-label">Driver</label>
                <select id="vio-driver-select" class="tc-modal-select">
                    <option value="">— Select Driver —</option>
                </select>
            </div>
        </div>

        <div class="tc-modal-row">
            <div class="tc-modal-field">
                <label class="tc-modal-label">Date of Violation</label>
                <input type="date" id="vio-date" class="tc-modal-input"/>
            </div>
            <div class="tc-modal-field">
                <label class="tc-modal-label">Penalty Type</label>
                <select id="vio-penalty" class="tc-modal-select" onchange="toggleVioPenalty()">
                    <option value="warning">Warning</option>
                    <option value="fine">Fine</option>
                </select>
            </div>
        </div>

        <div class="tc-modal-row">
            <div class="tc-modal-field" style="grid-column:1/-1">
                <label class="tc-modal-label">Violation Description</label>
                <input type="text" id="vio-violation" class="tc-modal-input"
                       placeholder="e.g. Operating during restricted hours"/>
            </div>
        </div>

        <div class="tc-modal-row" id="vio-amount-row" style="display:none">
            <div class="tc-modal-field" style="grid-column:1/-1">
                <label class="tc-modal-label">Fine Amount (₱)</label>
                <input type="number" id="vio-amount" class="tc-modal-input" placeholder="500"/>
            </div>
        </div>

        <div class="tc-modal-actions">
            <button class="tc-modal-cancel" onclick="closeVioModal()">Cancel</button>
            <button class="tc-modal-save" onclick="saveViolation()">Save Violation</button>
        </div>
    </div>
</div>

<!-- VIOLATION DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="vio-confirm">
    <div class="tc-modal" style="max-width:380px;width:380px;text-align:center">
        <div class="gen-confirm-icon" style="margin:0 auto 16px">
            <svg width="22" height="22" fill="none" stroke="var(--crimson)" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </div>
        <div class="tc-modal-title">Delete Violation</div>
        <p id="vio-confirm-sub" class="tc-modal-sub"></p>
        <div class="tc-modal-actions" style="justify-content:center">
            <button class="tc-modal-cancel" onclick="closeVioConfirm()">Cancel</button>
            <button class="tc-modal-save" style="background:var(--crimson)" onclick="confirmDeleteVio()">Delete</button>
        </div>
    </div>
</div>
</body>
</html>
