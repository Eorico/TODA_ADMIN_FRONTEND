<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- TRICYCLE CODING MODAL -->
<div class="tc-modal-overlay" id="coding-modal">
  <div class="tc-modal">
    <div class="tc-modal-tag">Tricycle Coding</div>
    <div class="tc-modal-title" id="tc-modal-title">Add Coding Schedule</div>
    <div class="tc-modal-sub" id="tc-modal-sub">Define an operational window for a body number range.</div>
    <div class="tc-modal-row">
      <div class="tc-modal-field">
        <label class="tc-modal-label">Day(s)</label>
        <select class="tc-modal-select" id="tc-day">
          <option>Monday</option>
          <option>Tuesday</option>
          <option>Wednesday</option>
          <option>Thursday</option>
          <option>Friday</option>
          <option>Saturday</option>
          <option>Sunday</option>
          <option>Mon / Wed</option>
          <option>Tue / Thu</option>
          <option>Mon – Fri</option>
        </select>
      </div>
      <div class="tc-modal-field">
        <label class="tc-modal-label">Status</label>
        <select class="tc-modal-select" id="tc-status">
          <option value="active">Active</option>
          <option value="suspended">Suspended</option>
          <option value="open-win">Open Window</option>
        </select>
      </div>
    </div>
    <div class="tc-modal-row">
      <div class="tc-modal-field">
        <label class="tc-modal-label">Body No. Ending (e.g. 1–2 or ALL)</label>
        <input class="tc-modal-input" id="tc-body-range" type="text" placeholder="e.g. 0 – 2"/>
      </div>
      <div class="tc-modal-field">
        <label class="tc-modal-label">Restriction Time</label>
        <input class="tc-modal-input" id="tc-time" type="text" placeholder="e.g. 7:00 AM – 7:00 PM"/>
      </div>
    </div>
    <div class="tc-modal-row">
      <div class="tc-modal-field">
        <label class="tc-modal-label">Route / Zone</label>
        <input class="tc-modal-input" id="tc-route" type="text" placeholder="e.g. All Routes"/>
      </div>
      <div class="tc-modal-field">
        <label class="tc-modal-label">Effectivity Date</label>
        <input class="tc-modal-input" id="tc-effectivity" type="date"/>
      </div>
    </div>
    <div class="tc-modal-actions">
      <button class="tc-modal-cancel" onclick="closeCodingModal()">Cancel</button>
      <button class="tc-modal-save" onclick="saveCodingSchedule()"><span id="tc-save-label">Add Schedule</span></button>
    </div>
  </div>
</div>

<!-- CODING DELETE CONFIRM -->
<div class="gen-confirm-overlay" id="coding-confirm">
  <div class="gen-confirm-box">
    <div class="gen-confirm-icon">
      <svg width="24" height="24" fill="none" stroke="var(--crimson)" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </div>
    <div class="gen-confirm-title">Remove Schedule</div>
    <div class="gen-confirm-sub" id="coding-confirm-sub">Are you sure you want to delete this coding schedule?</div>
    <div class="gen-confirm-btns">
      <button class="gen-confirm-cancel" onclick="closeCodingConfirm()">Cancel</button>
      <button class="gen-confirm-del" onclick="confirmDeleteCoding()">Delete</button>
    </div>
  </div>
</div>
</body>
</html>
