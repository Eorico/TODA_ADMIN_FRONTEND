<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- CONTRIBUTION ADD/EDIT MODAL -->
<div class="modal-overlay" id="cn-modal">
  <div class="tc-modal" style="max-width:480px;width:480px">
    <span class="tc-modal-tag">Contributions</span>
    <div class="tc-modal-title" id="cn-modal-title">Add Contribution</div>
    <div class="tc-modal-sub" id="cn-modal-sub">Record a driver's butaw/contribution.</div>

    <!-- Driver Select -->
    <div class="tc-modal-row">
      <div class="tc-modal-field" style="grid-column:1/-1">
        <label class="tc-modal-label">Driver</label>
        <select id="cn-driver-select" class="tc-modal-select">
          <option value="">— Select Driver —</option>
        </select>
      </div>
    </div>

    <!-- Body Number (auto-filled, read-only) -->
    <div class="tc-modal-row">
      <div class="tc-modal-field" style="grid-column:1/-1">
        <label class="tc-modal-label">Body Number</label>
        <input type="text" id="cn-body" class="tc-modal-input" placeholder="Auto-filled" readonly
          style="background:var(--bg-light);cursor:not-allowed;color:var(--text-muted)"/>
      </div>
    </div>

    <!-- Amount (full width now) -->
    <div class="tc-modal-row">
      <div class="tc-modal-field" style="grid-column:1/-1">
        <label class="tc-modal-label">Amount (₱)</label>
        <input type="number" id="cn-amount" class="tc-modal-input" placeholder="250.00" step="0.01" min="0"/>
      </div>
    </div>

    <!-- Date Paid + Status -->
    <div class="tc-modal-row">
      <div class="tc-modal-field">
        <label class="tc-modal-label">Date Paid</label>
        <input type="date" id="cn-date" class="tc-modal-input"/>
      </div>
      <div class="tc-modal-field">
        <label class="tc-modal-label">Payment Status</label>
        <select class="tc-modal-select" id="cn-paystatus">
          <option value="paid">Paid</option>
          <option value="partial">Partial</option>
          <option value="unpaid">Unpaid</option>
        </select>
      </div>
    </div>

    <div class="tc-modal-actions">
      <button class="tc-modal-cancel" onclick="closeCnModal()">Cancel</button>
      <button class="tc-modal-save" onclick="saveCnRecord()">
        <span id="cn-save-label">Save Record</span>
      </button>
    </div>
  </div>
</div>

<!-- CONTRIBUTION DELETE CONFIRM -->
<div class="modal-overlay" id="cn-confirm">
  <div class="tc-modal" style="max-width:380px;width:380px;text-align:center">
    <div class="gen-confirm-icon" style="margin:0 auto 16px">
      <svg width="22" height="22" fill="none" stroke="var(--crimson)" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
    </div>
    <div class="tc-modal-title">Delete Record</div>
    <p id="cn-confirm-sub" class="tc-modal-sub"></p>
    <div class="tc-modal-actions" style="justify-content:center">
      <button class="tc-modal-cancel" onclick="closeCnConfirm()">Cancel</button>
      <button class="tc-modal-save" style="background:var(--crimson)" onclick="confirmDeleteCn()">Delete</button>
    </div>
  </div>
</div>
</body>
</html>
